# use wildcard "*" to expose all endopoints
# can also expose individual endpoints with a command-delimited list

spring.application.name=mycoolapp
management.endpoints.web.exposure.include=*
management.info.env.enabled=true

# exclude individual endpoints with a command-delimited list
management.endpoints.web.exposure.exclude=health,info
info.app.name=My Super Cool App
info.app.description=A crazy fun app
info.app.version=1.0.0

# Define my crazy properties
coach.name=Rodrigol Crazy
team.name=Crazy Team

server.port=7070
server.servlet.context-path=/mycoolapp